<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>Нет связи · Gym Tracker</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        background: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .card { max-width: 360px; text-align: center; }
      h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 8px; }
      p { color: #8A8A8E; font-size: 15px; line-height: 1.45; margin: 0 0 24px; }
      button {
        appearance: none;
        border: 0;
        background: #34C759;
        color: #000;
        font: inherit;
        font-weight: 600;
        font-size: 15px;
        padding: 14px 22px;
        border-radius: 16px;
        cursor: pointer;
      }
      button:active { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Нет связи</h1>
      <p>Подключитесь к интернету, чтобы продолжить тренировку.</p>
      <button onclick="location.reload()">Попробовать снова</button>
    </div>
  </body>
</html>
